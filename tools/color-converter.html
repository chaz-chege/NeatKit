  </div>

  <div class="input-row">
    <input class="hex-input" id="hex-input" value="#c8f04a" placeholder="#rrggbb" oninput="fromHex(this.value)" maxlength="7">
  </div>

  <div class="sliders" id="sliders">
    <div class="slider-row"><label>R</label><input type="range" class="c-slider" id="r-slider" min="0" max="255" value="200" oninput="fromRGB()" style="background:linear-gradient(to right,#000,#ff0000)"><span class="slider-val" id="r-val">200</span></div>
    <div class="slider-row"><label>G</label><input type="range" class="c-slider" id="g-slider" min="0" max="255" value="240" oninput="fromRGB()" style="background:linear-gradient(to right,#000,#00ff00)"><span class="slider-val" id="g-val">240</span></div>
    <div class="slider-row"><label>B</label><input type="range" class="c-slider" id="b-slider" min="0" max="255" value="74" oninput="fromRGB()" style="background:linear-gradient(to right,#000,#0000ff)"><span class="slider-val" id="b-val">74</span></div>
  </div>

  <div class="formats-grid" id="formats-grid"></div>

  <div class="section-title">Palette</div>
  <div class="palette-grid" id="palette"></div>
</div>

<script>
  let r=200, g=240, b=74;

  function hexToRgb(hex) {
    hex = hex.replace('#','');
    if (hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
    if (hex.length !== 6) return null;
    const n = parseInt(hex, 16);
    if (isNaN(n)) return null;
    return { r: (n>>16)&255, g: (n>>8)&255, b: n&255 };
  }

  function rgbToHex(r,g,b) { return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }

  function rgbToHsl(r,g,b) {
    r/=255; g/=255; b/=255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2;
    if (mx===mn) return {h:0,s:0,l:Math.round(l*100)};
    const d=mx-mn, s=l>0.5?d/(2-mx-mn):d/(mx+mn);
    let h;
    if (mx===r) h=(g-b)/d+(g<b?6:0);
    else if (mx===g) h=(b-r)/d+2;
    else h=(r-g)/d+4;
    return {h:Math.round(h*60),s:Math.round(s*100),l:Math.round(l*100)};
  }

  function rgbToHsv(r,g,b) {
    r/=255; g/=255; b/=255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
    const s=mx===0?0:d/mx;
    let h=0;
    if (d!==0) {
      if (mx===r) h=((g-b)/d)%6;
      else if (mx===g) h=(b-r)/d+2;
      else h=(r-g)/d+4;
      h=Math.round(h*60); if(h<0)h+=360;
    }
    return {h,s:Math.round(s*100),v:Math.round(mx*100)};
  }

  function rgbToCmyk(r,g,b) {
    r/=255; g/=255; b/=255;
    const k=1-Math.max(r,g,b);
    if (k===1) return {c:0,m:0,y:0,k:100};
    return {c:Math.round((1-r-k)/(1-k)*100),m:Math.round((1-g-k)/(1-k)*100),y:Math.round((1-b-k)/(1-k)*100),k:Math.round(k*100)};
  }

  function update() {
    const hex = rgbToHex(r,g,b);
    const hsl = rgbToHsl(r,g,b);
    const hsv = rgbToHsv(r,g,b);
    const cmyk = rgbToCmyk(r,g,b);
    const brightness = (r*299+g*587+b*114)/1000;
    const textColor = brightness > 128 ? '#111' : '#eee';

    document.getElementById('hero').style.background = hex;
    document.getElementById('hero').style.color = textColor;
    document.getElementById('color-name').textContent = hex.toUpperCase();
    document.getElementById('color-picker').value = hex;
    document.getElementById('hex-input').value = hex;

    document.getElementById('r-slider').value = r;
    document.getElementById('g-slider').value = g;
    document.getElementById('b-slider').value = b;
    document.getElementById('r-val').textContent = r;
    document.getElementById('g-val').textContent = g;
    document.getElementById('b-val').textContent = b;

    const formats = [
      {label:'HEX', val: hex.toUpperCase()},
      {label:'RGB', val: `rgb(${r}, ${g}, ${b})`},
      {label:'RGBA', val: `rgba(${r}, ${g}, ${b}, 1)`},
      {label:'HSL', val: `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`},
      {label:'HSV', val: `hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`},
      {label:'CMYK', val: `cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`},
      {label:'CSS var', val: `--color: ${hex};`},
      {label:'Integer', val: (r<<16|g<<8|b).toString()}
    ];

    document.getElementById('formats-grid').innerHTML = formats.map(f =>
      `<div class="format-card" onclick="copy('${f.val}', this)">
        <div class="format-label"><span>${f.label}</span><span class="format-copy">click to copy</span></div>
        <div class="format-val">${f.val}</div>
      </div>`
    ).join('');

    buildPalette(hsl);
  }

  function buildPalette(hsl) {
    const shades = [10,20,30,40,50,60,70,80,90].map(l => {
      const c = `hsl(${hsl.h},${hsl.s}%,${l}%)`;
      return `<div class="palette-swatch" style="background:${c}" onclick="fromHex(hslToHex(${hsl.h},${hsl.s},${l}))">
        <div class="swatch-tip">${l}%</div>
      </div>`;
    });
    const comps = [
      [hsl.h, hsl.s, hsl.l],
      [(hsl.h+120)%360, hsl.s, hsl.l],
      [(hsl.h+240)%360, hsl.s, hsl.l],
      [(hsl.h+180)%360, hsl.s, hsl.l]
    ].map(([h,s,l]) => {
      const c = `hsl(${h},${s}%,${l}%)`;
      return `<div class="palette-swatch" style="background:${c}">
        <div class="swatch-tip">hsl(${h},${s}%,${l}%)</div>
      </div>`;
    });
    document.getElementById('palette').innerHTML = shades.join('') + comps.join('');
  }

  function hslToHex(h,s,l) {
    s/=100; l/=100;
    const a=s*Math.min(l,1-l);
    const f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
    return '#'+f(0)+f(8)+f(4);
  }

  function fromHex(val) {
    const rgb = hexToRgb(val);
    if (!rgb) return;
    r=rgb.r; g=rgb.g; b=rgb.b;
    update();
  }

  function fromPicker(val) { fromHex(val); }

  function fromRGB() {
    r=parseInt(document.getElementById('r-slider').value);
    g=parseInt(document.getElementById('g-slider').value);
    b=parseInt(document.getElementById('b-slider').value);
    update();
  }

  function copy(text, el) {
    navigator.clipboard.writeText(text).then(() => {
      const label = el.querySelector('.format-copy');
      label.textContent = 'copied!';
      setTimeout(() => label.textContent = 'click to copy', 1500);
    });
  }

  update();
</script>
