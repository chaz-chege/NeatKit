<body>
<nav class="nk-nav">

<div class="container">
  <h1>Unit Converter</h1>
  <p class="subtitle">200+ unit combinations. All conversions happen instantly in your browser.</p>

  <div class="cat-tabs" id="cat-tabs"></div>

  <div class="converter-card">
    <div class="input-row">
      <div class="field">
        <label>From</label>
        <input type="number" id="val-from" value="1" oninput="convert('from')">
        <select id="unit-from" onchange="convert('from'); updateAllConversions()"></select>
      </div>
      <button class="swap-btn" onclick="swapUnits()" title="Swap units">⇄</button>
      <div class="field">
        <label>To</label>
        <input type="number" id="val-to" class="result" readonly>
        <select id="unit-to" onchange="convert('from'); updateAllConversions()"></select>
      </div>
    </div>

    <div class="all-conversions">
      <div class="conv-title">All conversions for <span id="conv-label">1 unit</span></div>
      <div class="conv-grid" id="conv-grid"></div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = {
  Length: {
    units: {
      'Kilometer': 1000, 'Meter': 1, 'Centimeter': 0.01, 'Millimeter': 0.001,
      'Mile': 1609.344, 'Yard': 0.9144, 'Foot': 0.3048, 'Inch': 0.0254,
      'Nautical mile': 1852, 'Light year': 9.461e15
    }
  },
  Weight: {
    units: {
      'Tonne': 1000000, 'Kilogram': 1000, 'Gram': 1, 'Milligram': 0.001,
      'Pound': 453.592, 'Ounce': 28.3495, 'Stone': 6350.29, 'US ton': 907185
    }
  },
  Temperature: { special: true },
  Speed: {
    units: {
      'm/s': 1, 'km/h': 0.277778, 'mph': 0.44704, 'knot': 0.514444, 'ft/s': 0.3048
    }
  },
  Area: {
    units: {
      'km²': 1e6, 'm²': 1, 'cm²': 0.0001, 'Hectare': 10000,
      'Acre': 4046.86, 'mile²': 2589988.1, 'ft²': 0.092903, 'in²': 0.00064516
    }
  },
  Volume: {
    units: {
      'Liter': 1, 'Milliliter': 0.001, 'Cubic meter': 1000, 'Cubic cm': 0.001,
      'US gallon': 3.78541, 'US quart': 0.946353, 'US pint': 0.473176,
      'US cup': 0.236588, 'US fl oz': 0.0295735, 'UK gallon': 4.54609
    }
  },
  Data: {
    units: {
      'Bit': 1, 'Byte': 8, 'Kilobyte': 8192, 'Megabyte': 8388608,
      'Gigabyte': 8589934592, 'Terabyte': 8796093022208,
      'Kilobit': 1000, 'Megabit': 1000000, 'Gigabit': 1000000000
    }
  },
  Pressure: {
    units: {
      'Pascal': 1, 'Kilopascal': 1000, 'Bar': 100000, 'PSI': 6894.76,
      'Atmosphere': 101325, 'mmHg': 133.322, 'Torr': 133.322
    }
  }
};

const TEMP_UNITS = ['Celsius', 'Fahrenheit', 'Kelvin', 'Rankine'];

function convertTemp(val, from, to) {
  let celsius;
  if (from === 'Celsius') celsius = val;
  else if (from === 'Fahrenheit') celsius = (val - 32) * 5/9;
  else if (from === 'Kelvin') celsius = val - 273.15;
  else if (from === 'Rankine') celsius = (val - 491.67) * 5/9;

  if (to === 'Celsius') return celsius;
  if (to === 'Fahrenheit') return celsius * 9/5 + 32;
  if (to === 'Kelvin') return celsius + 273.15;
  if (to === 'Rankine') return (celsius + 273.15) * 9/5;
}

let currentCat = 'Length';

function buildTabs() {
  const container = document.getElementById('cat-tabs');
  container.innerHTML = Object.keys(CATEGORIES).map(cat =>
    `<button class="cat-tab${cat === currentCat ? ' active' : ''}" onclick="selectCat('${cat}')">${cat}</button>`
  ).join('');
}

function buildSelects() {
  const cat = CATEGORIES[currentCat];
  const units = cat.special ? TEMP_UNITS : Object.keys(cat.units);
  const fromSel = document.getElementById('unit-from');
  const toSel = document.getElementById('unit-to');
  fromSel.innerHTML = units.map((u, i) => `<option value="${u}">${u}</option>`).join('');
  toSel.innerHTML = units.map((u, i) => `<option value="${u}" ${i === 1 ? 'selected' : ''}>${u}</option>`).join('');
}

function selectCat(cat) {
  currentCat = cat;
  buildTabs();
  buildSelects();
  document.getElementById('val-from').value = 1;
  convert('from');
  updateAllConversions();
}

function formatNum(n) {
  if (isNaN(n)) return '—';
  if (Math.abs(n) >= 1e12 || (Math.abs(n) < 0.0001 && n !== 0)) return n.toExponential(4);
  const s = parseFloat(n.toPrecision(7)).toString();
  return s;
}

function convert(dir) {
  const cat = CATEGORIES[currentCat];
  const fromUnit = document.getElementById('unit-from').value;
  const toUnit = document.getElementById('unit-to').value;
  const fromVal = parseFloat(document.getElementById('val-from').value);

  if (isNaN(fromVal)) { document.getElementById('val-to').value = ''; return; }

  let result;
  if (cat.special) {
    result = convertTemp(fromVal, fromUnit, toUnit);
  } else {
    const fromFactor = cat.units[fromUnit];
    const toFactor = cat.units[toUnit];
    result = fromVal * fromFactor / toFactor;
  }

  document.getElementById('val-to').value = formatNum(result);
  document.getElementById('conv-label').textContent = fromVal + ' ' + fromUnit;
}

function updateAllConversions() {
  const cat = CATEGORIES[currentCat];
  const fromUnit = document.getElementById('unit-from').value;
  const fromVal = parseFloat(document.getElementById('val-from').value) || 1;
  const units = cat.special ? TEMP_UNITS : Object.keys(cat.units);

  document.getElementById('conv-grid').innerHTML = units.filter(u => u !== fromUnit).map(toUnit => {
    let result;
    if (cat.special) {
      result = convertTemp(fromVal, fromUnit, toUnit);
    } else {
      result = fromVal * cat.units[fromUnit] / cat.units[toUnit];
    }
    return `<div class="conv-item" onclick="setToUnit('${toUnit}')">
      <div class="conv-val">${formatNum(result)}</div>
      <div class="conv-unit">${toUnit}</div>
    </div>`;
  }).join('');
}

function setToUnit(unit) {
  document.getElementById('unit-to').value = unit;
  convert('from');
  updateAllConversions();
}

function swapUnits() {
  const fromSel = document.getElementById('unit-from');
  const toSel = document.getElementById('unit-to');
  const fromVal = document.getElementById('val-from').value;
  const toVal = document.getElementById('val-to').value;
  const tmp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = tmp;
  document.getElementById('val-from').value = toVal || fromVal;
  convert('from');
  updateAllConversions();
}

buildTabs();
buildSelects();
convert('from');
updateAllConversions();
</script>
</body>
